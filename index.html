<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Games</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    transition:background 1s ease;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.arcade-container{
    position:relative;

    width:800px;
    height:950px;

    overflow:hidden;

    border-radius:24px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.4),
        inset 0 0 20px rgba(255,255,255,.05);

    backdrop-filter:blur(10px);
}

.slider{
    display:flex;

    width:100%;
    height:100%;

    transition:transform .8s cubic-bezier(.77,0,.18,1);
}

.game{
    min-width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.15);
}

iframe{
    width:100%;
    height:100%;
    border:none;

    background:white;
}

.nav-button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);

    width:60px;
    height:60px;

    border:none;
    border-radius:50%;

    font-size:28px;
    cursor:pointer;

    z-index:10;

    background:rgba(0,0,0,.25);
    color:white;

    backdrop-filter:blur(10px);

    transition:.3s;
}

.nav-button:hover{
    transform:translateY(-50%) scale(1.1);
    background:rgba(255,255,255,.3);
    color: black;
}

.left{
    left:20px;
}

.right{
    right:20px;
}

.game-title{
    position:absolute;

    top:20px;
    left:50%;

    transform:translateX(-50%);

    z-index:20;

    padding:10px 20px;

    border-radius:999px;

    background:rgba(255,255,255,.12);

    color:white;

    font-size:20px;
    font-weight:bold;

    backdrop-filter:blur(10px);

    letter-spacing:2px;
}

</style>
</head>
<body>

<div class="arcade-container">

    <div class="game-title" id="gameTitle">
        Snake
    </div>

    <button class="nav-button left" id="prev">
        ←
    </button>

    <button class="nav-button right" id="next">
        →
    </button>

    <div class="slider" id="slider">

        <div class="game">
            <iframe src="./cobrinha-jogo/index.html"></iframe>
        </div>

        <div class="game">
            <iframe src="./flappy-bird/index.html"></iframe>
        </div>

        <div class="game">
            <iframe src="./pacman/pacman.html"></iframe>
        </div>

        <div class="game">
            <iframe src="./pokedex/index.html"></iframe>
        </div>

        <div class="game">
            <iframe src="./tetris/index.html"></iframe>
        </div>

    </div>
</div>

<script>

const slider = document.getElementById("slider");

const title = document.getElementById("gameTitle");

const games = [
    {
        name:"Snake",
        bg:"linear-gradient(135deg,#134E5E,#71B280)"
    },

    {
        name:"Flappy Bird",
        bg:"linear-gradient(135deg,#56CCF2,#2F80ED)"
    },

    {
        name:"Pacman",
        bg:"linear-gradient(135deg,#000000,#434343)"
    },

    {
        name:"Pokédex",
        bg:"linear-gradient(135deg,#ff416c,#ff4b2b)"
    },

    {
        name:"Tetris",
        bg:"linear-gradient(135deg,#8E2DE2,#4A00E0)"
    }
];

let current = 0;

function updateGame(){

    slider.style.transform =
        `translateX(-${current * 100}%)`;

    document.body.style.background =
        games[current].bg;

    title.textContent =
        games[current].name;
}

document.getElementById("next")
.addEventListener("click",()=>{

    current++;

    if(current >= games.length){
        current = 0;
    }

    updateGame();
});

document.getElementById("prev")
.addEventListener("click",()=>{

    current--;

    if(current < 0){
        current = games.length - 1;
    }

    updateGame();
});

document.addEventListener("keydown",(e)=>{

    if(e.key === "ArrowRight"){
        document.getElementById("next").click();
    }

    if(e.key === "ArrowLeft"){
        document.getElementById("prev").click();
    }
});

updateGame();

</script>

</body>
</html>
